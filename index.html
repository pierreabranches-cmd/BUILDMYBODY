<!DOCTYPE html>
<html>
<head>
  <title>BUILDMYBODY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      background: #0B0B0B;
      color: white;
      text-align: center;
      padding: 40px;
    }
    h1 {
      color: #D4AF37;
    }
    .card {
      background: #1A1A1A;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
      display: inline-block;
    }
    input {
      padding: 10px;
      margin: 5px;
      width: 200px;
      border-radius: 6px;
      border: none;
    }
    button {
      padding: 10px 20px;
      background: #D4AF37;
      border: none;
      color: black;
      font-weight: bold;
      margin-top: 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h1>BUILDMYBODY</h1>
<p>by Pierre Abranches</p>

<div class="card">
  <h2>BMI Calculator</h2>
  <input id="weight" placeholder="Weight (kg)" type="number"><br>
  <input id="height" placeholder="Height (cm)" type="number"><br>
  <button onclick="calcBMI()">Calculate</button>
  <p id="result"></p>
</div>

<script>
function calcBMI() {
  let w = document.getElementById('weight').value;
  let h = document.getElementById('height').value / 100;
  let bmi = w / (h*h);
  document.getElementById('result').innerText = "Your BMI: " + bmi.toFixed(2);
}
</script>

</body>
</html>
