<!DOCTYPE html>
<html>
<head>
  <title>BUILD MY BODY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Correct Supabase Script -->
  <script src="<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0B0B0B;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 { color: #D4AF37; }

    .card {
      background: #1c1c1c;
      padding: 25px;
      border-radius: 12px;
      max-width: 400px;
      margin: auto;
      margin-top: 20px;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #D4AF37;
      border: none;
      color: black;
      padding: 12px 20px;
      margin: 10px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .hidden { display: none; }
  </style>
</head>
<body>
<h1>BUILD MY BODY</h1>
<p>by Pierre Abranches</p>
<div id="auth" class="card">
  <h2>Login / Signup</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <br>
  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>
  <p id="authMsg"></p>
</div>
<div id="dashboard" class="card hidden">
  <h2>Dashboard</h2>
  <p>Welcome to BUILD MY BODY</p>
  <h3>BMI Calculator</h3>
  <input id="weight" placeholder="Weight (kg)" type="number">
  <input id="height" placeholder="Height (cm)" type="number">
  <button onclick="calcBMI()">Calculate</button>
  <p id="result"></p>
</div>
<script>
const SUPABASE_URL = "https://mgqjotpbbifsivgovdnv.supabase.co";
const SUPABASE_KEY = "sb_publishable__1pYlvGapB_5ISr8_OKig_g-DsrtaV";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);


// SIGN UP
async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signUp({
    email,
    password
  });

  document.getElementById("authMsg").innerText =
    error ? error.message : "Signup successful! Check your email.";
}


// LOGIN
async function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password
  });

  if (error) {
    document.getElementById("authMsg").innerText = error.message;
  } else {
    document.getElementById("auth").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");
  }
}


// LOGOUT
async function logout() {
  await supabase.auth.signOut();
  location.reload();
}


// BMI
function calcBMI() {
  const weight = document.getElementById("weight").value;
  const height = document.getElementById("height").value / 100;

  if (!weight || !height) return;

  const bmi = (weight / (height * height)).toFixed(2);
  document.getElementById("result").innerText = "BMI: " + bmi;
}
</script>
  <script src="app.js"></script>
</body>
</html>
