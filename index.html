<!DOCTYPE html>
<html>
<head>
  <title>BUILDMYBODY</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      background: #0B0B0B;
      color: white;
      text-align: center;
      padding: 40px;
    }

    h1 { color: #D4AF37; }

    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 10px;
      max-width: 400px;
      margin: auto;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px;
      border-radius: 6px;
      border: none;
    }

    button {
      background: #D4AF37;
      border: none;
      padding: 10px 20px;
      margin: 10px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
    }

    .hidden { display: none; }
  </style>
</head>

<body>

<h1>BUILD MY BODY</h1>
<p>by Pierre Abranches</p>

<div id="auth" class="card">
  <h2>Login / Signup</h2>

  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="login()">Login</button>

  <p id="authMsg"></p>
</div>

<div id="dashboard" class="card hidden">
  <h2>Dashboard</h2>

  <h3>BMI Calculator</h3>

  <input id="weight" placeholder="Weight (kg)">
  <input id="height" placeholder="Height (cm)">

  <button onclick="calcBMI()">Calculate</button>

  <p id="result"></p>

  <button onclick="logout()">Logout</button>
</div>

<script>
  alert("JS WORKING");
  const SUPABASE_URL = "https://mgqjotpbbifsivgovdnv.supabase.co";
  const SUPABASE_KEY = "sb_publishable__1pYlvGapB_5ISr8_OKig_g-DsrtaV";

  const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  async function signUp() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signUp({ email, password });

    document.getElementById("authMsg").innerText =
      error ? error.message : "Signup successful! Check email.";
  }

  async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      document.getElementById("authMsg").innerText = error.message;
    } else {
      document.getElementById("auth").classList.add("hidden");
      document.getElementById("dashboard").classList.remove("hidden");
    }
  }

  function calcBMI() {
    const w = document.getElementById("weight").value;
    const h = document.getElementById("height").value / 100;

    const bmi = (w / (h * h)).toFixed(2);

    document.getElementById("result").innerText = "BMI: " + bmi;
  }

  async function logout() {
    await supabase.auth.signOut();
    location.reload();
  }
<script>
alert("JS WORKING");
</script>
</body>
</html>
